<!DOCTYPE html>
<html>
<head>
  <title>My Money</title>
</head>
<body>

<h2>Signup</h2>
<input id="s_email" placeholder="Email"><br><br>
<input id="s_pass" placeholder="Password" type="password"><br><br>
<button onclick="signup()">Signup</button>

<hr>

<h2>Login</h2>
<input id="email" placeholder="Email"><br><br>
<input id="password" placeholder="Password" type="password"><br><br>
<button onclick="login()">Login</button>

<hr>

<h2>Balance: ₹ <span id="balance">0</span></h2>

<h3>Add Transaction</h3>
<select id="type">
  <option value="income">Income</option>
  <option value="expense">Expense</option>
</select><br><br>

<input id="amount" placeholder="Amount"><br><br>
<input id="category" placeholder="Category"><br><br>

<button onclick="addTransaction()">Add</button>

<hr>

<h3>Transactions</h3>
<ul id="list"></ul>

<script>

const API = "https://my-money-backend-dq7n.onrender.com";

// ✅ SIGNUP
async function signup(){
  try{
    const res = await fetch(API + "/api/auth/register", {
      method:"POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({
        email: document.getElementById("s_email").value,
        password: document.getElementById("s_pass").value
      })
    });

    const data = await res.json();
    console.log(data);

    if(res.ok){
      alert("Signup Success ✅");
    }else{
      alert(data.error || "Signup Failed ❌");
    }

  }catch(err){
    console.log(err);
    alert("Server Error ❌");
  }
}

// ✅ LOGIN
async function login(){
  try{
    alert("Login start");

    const res = await fetch(API + "/api/auth/login", {
      method:"POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({
        email: document.getElementById("email").value,
        password: document.getElementById("password").value
      })
    });

    alert("Response aaya");

    const text = await res.text();
    alert("Server bola: " + text);

  }catch(err){
    alert("Error: " + err);
  }
}

// ✅ ADD TRANSACTION
async function addTransaction(){
  try{
    const res = await fetch(API + "/api/transactions", {
      method:"POST",
      headers:{
        "Content-Type":"application/json",
        "Authorization": "Bearer " + localStorage.getItem("token")
      },
      body: JSON.stringify({
        type: document.getElementById("type").value,
        amount: Number(document.getElementById("amount").value),
        category: document.getElementById("category").value
      })
    });

    const data = await res.json();
    console.log(data);

    if(res.ok){
      alert("Added ✅");
      getTransactions();
    }else{
      alert(data.error || "Error ❌");
    }

  }catch(err){
    console.log(err);
    alert("Server Error ❌");
  }
}

// ✅ GET TRANSACTIONS
async function getTransactions(){
  try{
    const res = await fetch(API + "/api/transactions", {
      headers:{
        "Authorization": "Bearer " + localStorage.getItem("token")
      }
    });

    const data = await res.json();
    console.log(data);

    if(res.ok){
      updateUI(data);
    }

  }catch(err){
    console.log(err);
  }
}

// ✅ UPDATE UI
function updateUI(data){
  const list = document.getElementById("list");
  const balance = document.getElementById("balance");

  list.innerHTML = "";
  let total = 0;

  data.forEach(t=>{
    const li = document.createElement("li");
    li.innerText = `${t.category} ₹${t.amount} (${t.type})`;
    list.appendChild(li);

    if(t.type === "income"){
      total += t.amount;
    }else{
      total -= t.amount;
    }
  });

  balance.innerText = total;
}

</script>

</body>
</html>
