<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Money</title>

<style>
body{
  font-family:sans-serif;
  background:#0f172a;
  color:white;
  padding:15px;
}
.card{
  background:#1e293b;
  padding:15px;
  margin:10px 0;
  border-radius:10px;
}
input,select{
  width:100%;
  padding:10px;
  margin:5px 0;
}
button{
  padding:10px;
  background:#22c55e;
  border:none;
  color:white;
}
</style>
</head>

<body>

<h2>💰 My Money (Simple Working)</h2>

<!-- SIGNUP -->
<div class="card">
<h3>Signup</h3>
<input id="s_email" placeholder="Email">
<input id="s_pass" type="password" placeholder="Password">
<button onclick="signup()">Signup</button>
</div>

<!-- LOGIN -->
<div class="card">
<h3>Login</h3>
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<button onclick="login()">Login</button>
</div>

<!-- BALANCE -->
<div class="card">
<h3>Balance: ₹ <span id="balance">0</span></h3>
</div>

<!-- ADD TRANSACTION -->
<div class="card">
<select id="type">
<option value="income">Income</option>
<option value="expense">Expense</option>
</select>

<input id="amount" type="number" placeholder="Amount">
<input id="category" placeholder="Category">

<button onclick="addTransaction()">Add</button>
</div>

<!-- LIST -->
<div class="card">
<ul id="list"></ul>
</div>

<script>

const API = "https://my-money-backend-dq7n.onrender.com";

let data = [];

// ✅ SIGNUP
async function signup(){
  try{
    const res = await fetch(API + "/signup",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        email: s_email.value,
        password: s_pass.value
      })
    });

    const d = await res.json();
    console.log("SIGNUP:", d);

    if(d.success){
      alert("Signup Success ✅");
    }else{
      alert(d.error || "Signup Failed ❌");
    }

  }catch(err){
    alert("Server Error ❌");
  }
}

// ✅ LOGIN
async function login(){
  try{
    const res = await fetch(API + "/login",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        email: email.value,
        password: password.value
      })
    });

    const d = await res.json();
    console.log("LOGIN:", d);

    if(d.token){
      localStorage.setItem("token", d.token);
      alert("Login Success ✅");
    }else{
      alert(d.error || "Login Failed ❌");
    }

  }catch(err){
    alert("Server Error ❌");
  }
}

// ✅ ADD TRANSACTION
function addTransaction(){

  const t = {
    type: type.value,
    amount: Number(amount.value),
    category: category.value
  };

  data.push(t);
  updateUI();
}

// ✅ UPDATE UI
function updateUI(){
  list.innerHTML = "";
  let total = 0;

  data.forEach((t,i)=>{
    const li = document.createElement("li");

    li.innerHTML = `
      ${t.category} ₹${t.amount} (${t.type})
      <button onclick="remove(${i})">❌</button>
    `;

    list.appendChild(li);

    if(t.type === "income"){
      total += t.amount;
    }else{
      total -= t.amount;
    }
  });

  balance.innerText = total;
}

// ✅ DELETE
function remove(i){
  data.splice(i,1);
  updateUI();
}

</script>

</body>
</html>
