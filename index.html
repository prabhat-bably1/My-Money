<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Money SaaS</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://checkout.razorpay.com/v1/checkout.js"></script>

<style>
body{
  font-family:sans-serif;
  background:#0f172a;
  color:white;
  padding:15px;
}
.card{
  background:#1e293b;
  padding:15px;
  margin:10px 0;
  border-radius:10px;
}
input,select{
  width:100%;
  padding:10px;
  margin:5px 0;
}
button{
  padding:10px;
  background:#22c55e;
  border:none;
  color:white;
  margin-top:5px;
}
.pro{
  background:gold;
  color:black;
}
</style>
</head>

<body>

<h2>💰 My Money SaaS</h2>

<!-- SIGNUP -->
<div class="card">
<h3>Signup</h3>
<input id="s_email" placeholder="Email">
<input id="s_pass" type="password" placeholder="Password">
<button onclick="signup()">Signup</button>
</div>

<!-- LOGIN -->
<div class="card">
<h3>Login</h3>
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<button onclick="login()">Login</button>
</div>

<!-- ADD MONEY -->
<div class="card">
<h3>Add Money</h3>
<select id="type">
<option value="income">Income</option>
<option value="expense">Expense</option>
</select>

<input id="amount" type="number" placeholder="Amount">
<input id="category" placeholder="Category">
<input id="note" placeholder="Note">

<button onclick="addTransaction()">Add</button>
</div>

<!-- PRO -->
<div class="card">
<button class="pro" onclick="pay()">Buy Pro ₹99</button>
</div>

<!-- LIST -->
<div class="card">
<h3>Transactions</h3>
<ul id="list"></ul>
</div>

<canvas id="chart"></canvas>

<script>

const API = "https://my-money-backend-dq7n.onrender.com";
let token = localStorage.getItem("token") || "";
let data = [];

// ✅ SIGNUP
async function signup(){
  const res = await fetch(API + "/signup",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      email: s_email.value,
      password: s_pass.value
    })
  });

  const d = await res.json();
  alert("Signup Success ✅");
}

// ✅ LOGIN
async function login(){
  try{
    const res = await fetch(API + "/login",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        email: document.getElementById("email").value,
        password: document.getElementById("password").value
      })
    });

    const d = await res.json();
    console.log("LOGIN:", d);

    if(d.success){
      localStorage.setItem("token", d.token);
      token = d.token;
      alert("Login Success ✅");
    }else{
      alert(d.error || "Login Failed ❌");
    }

  }catch(err){
    alert("Server Error ❌");
  }
}

// ✅ ADD TRANSACTION (frontend only for now)
function addTransaction(){
  const t = {
    type: type.value,
    amount: Number(amount.value),
    category: category.value,
    note: note.value
  };

  data.push(t);
  updateUI();
}

// ✅ UI UPDATE
function updateUI(){
  list.innerHTML = "";
  let total = 0;

  data.forEach((t,i)=>{
    const li = document.createElement("li");

    li.innerHTML = `
      ${t.category} ₹${t.amount} (${t.type})
      <button onclick="remove(${i})">❌</button>
    `;

    list.appendChild(li);

    if(t.type==="income") total += t.amount;
    else total -= t.amount;
  });

  drawChart();
}

// ✅ DELETE
function remove(i){
  data.splice(i,1);
  updateUI();
}

// ✅ CHART
function drawChart(){
  new Chart(chart,{
    type:"bar",
    data:{
      labels:data.map((_,i)=>"T"+i),
      datasets:[{data:data.map(d=>d.amount)}]
    }
  });
}

// ✅ PAYMENT
async function pay(){
  const res = await fetch(API + "/create-order",{method:"POST"});
  const order = await res.json();

  const options = {
    key: order.key,
    amount: order.amount,
    currency:"INR",
    order_id: order.id,

    handler: async function(response){
      await fetch(API + "/verify-payment",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify(response)
      });

      alert("Payment Success 🎉");
    }
  };

  new Razorpay(options).open();
}

</script>

</body>
</html>
