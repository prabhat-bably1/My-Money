<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Money Pro</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body{margin:0;font-family:system-ui;background:#0f172a;color:#e2e8f0}
    header{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;background:#020617}
    .container{padding:16px;max-width:900px;margin:auto}
    .card{background:#020617;padding:16px;border-radius:12px;margin-bottom:12px}
    input,select,button{padding:10px;border-radius:8px;border:none;margin:4px}
    button{background:#38bdf8;color:#000;font-weight:600}
    .row{display:flex;flex-wrap:wrap;gap:8px}
    table{width:100%;margin-top:10px;border-collapse:collapse}
    th,td{padding:8px;border-bottom:1px solid #1e293b}
    .income{color:#4ade80}
    .expense{color:#f87171}
  </style>
</head>
<body>
<header>
  <div>💰 My Money Pro</div>
  <div id="userBox"></div>
</header>

<div class="container" id="app"></div>

<script>
// ===== SIMPLE AUTH =====
let user = localStorage.getItem('user');
function showAuth(){
  document.getElementById('app').innerHTML = `
    <div class='card'>
      <h3>Login / Signup</h3>
      <input id='username' placeholder='Enter name'>
      <button onclick='login()'>Continue</button>
    </div>`;
}
function login(){
  const name = document.getElementById('username').value;
  if(!name) return alert('Enter name');
  localStorage.setItem('user', name);
  user = name;
  init();
}
function logout(){
  localStorage.removeItem('user');
  location.reload();
}

// ===== APP =====
let data = JSON.parse(localStorage.getItem('money-data')) || [];

function init(){
  document.getElementById('userBox').innerHTML = `${user} <button onclick='logout()'>Logout</button>`;
  renderUI();
  render();
}

function renderUI(){
  document.getElementById('app').innerHTML = `
    <div class='card'>
      <h3>Add Transaction</h3>
      <div class='row'>
        <input id='desc' placeholder='Description'>
        <input id='amount' type='number' placeholder='Amount'>
        <select id='type'>
          <option value='income'>Income</option>
          <option value='expense'>Expense</option>
        </select>
        <select id='category'>
          <option>General</option>
          <option>Food</option>
          <option>Salary</option>
          <option>Shopping</option>
        </select>
        <button onclick='add()'>Add</button>
      </div>
    </div>

    <div class='card'>
      <h3>Balance: ₹<span id='bal'>0</span></h3>
      <canvas id='chart'></canvas>
    </div>

    <div class='card'>
      <h3>Transactions</h3>
      <table>
        <thead><tr><th>Desc</th><th>₹</th><th>Type</th><th>Cat</th><th>Action</th></tr></thead>
        <tbody id='list'></tbody>
      </table>
    </div>`;
}

function add(){
  const t = {
    id: Date.now(),
    desc: desc.value,
    amount: +amount.value,
    type: type.value,
    category: category.value,
    date: new Date().toISOString()
  };
  if(!t.desc || !t.amount) return alert('Fill all');
  data.push(t);
  save(); render();
}

function del(id){
  data = data.filter(x=>x.id!==id);
  save(); render();
}

function save(){ localStorage.setItem('money-data', JSON.stringify(data)); }

let chart;
function render(){
  let inc=0, exp=0;
  list.innerHTML='';
  data.forEach(x=>{
    list.innerHTML += `<tr>
      <td>${x.desc}</td>
      <td>₹${x.amount}</td>
      <td class='${x.type}'>${x.type}</td>
      <td>${x.category}</td>
      <td><button onclick='del(${x.id})'>X</button></td>
    </tr>`;
    x.type==='income'? inc+=x.amount : exp+=x.amount;
  });
  bal.innerText = inc-exp;
  drawChart(inc,exp);
}

function drawChart(i,e){
  if(chart) chart.destroy();
  chart = new Chart(chart = document.getElementById('chart'),{
    type:'doughnut',
    data:{labels:['Income','Expense'],datasets:[{data:[i,e]}]}
  });
}

// ===== START =====
if(!user) showAuth(); else init();
</script>
</body>
</html>
