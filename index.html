<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Money PRO</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{margin:0;font-family:sans-serif;background:#0f172a;color:#fff}
header{display:flex;justify-content:space-between;padding:15px;background:#1e293b}
.container{padding:15px;max-width:1000px;margin:auto}
.card{background:#1e293b;padding:15px;border-radius:12px;margin-bottom:15px}
input,select{padding:10px;border-radius:8px;border:none}
button{padding:10px;border:none;border-radius:8px;background:#22c55e;color:#000;cursor:pointer}
table{width:100%;margin-top:10px}
.balance{font-size:24px}
</style>
</head>

<body>

<header>
<div>💰 My Money PRO</div>
<div id="userBox"></div>
</header>

<div class="container" id="app"></div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

<script>

// 🔥 CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyCx1EaNBZanLA5YDzWZcGKsMQOw0UqMuDU",
  authDomain: "my-money-app-28804.firebaseapp.com",
  projectId: "my-money-app-28804",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const auth = firebase.auth();

let user;
let data=[];
let chart;

// ================= LOGIN

function showLogin(){
  app.innerHTML = `
    <div class="card">
      <h2>Login</h2>
      <button onclick="googleLogin()">Login with Google</button>
    </div>
  `;
}

function googleLogin(){
  const provider = new firebase.auth.GoogleAuthProvider();
  auth.signInWithPopup(provider);
}

function logout(){
  auth.signOut();
}

// ================= AUTH STATE

auth.onAuthStateChanged(u=>{
  if(u){
    user = u;
    init();
  }else{
    showLogin();
  }
});

// ================= INIT

function init(){
  userBox.innerHTML = `👤 ${user.displayName} <button onclick="logout()">Logout</button>`;
  renderUI();
  loadData();
}

// ================= UI

function renderUI(){
  app.innerHTML = `
  <div class="card">
    <h3>Add</h3>
    <input id="desc" placeholder="Desc">
    <input id="amount" type="number">
    <select id="type">
      <option value="income">Income</option>
      <option value="expense">Expense</option>
    </select>
    <button onclick="add()">Add</button>
  </div>

  <div class="card">
    <div class="balance">₹<span id="bal">0</span></div>
    <div>Income: ₹<span id="inc">0</span></div>
    <div>Expense: ₹<span id="exp">0</span></div>
    <canvas id="chart"></canvas>
  </div>

  <div class="card">
    <table>
      <tbody id="list"></tbody>
    </table>
  </div>
  `;
}

// ================= ADD

function add(){
  const t={
    id:Date.now().toString(),
    uid:user.uid,
    desc:desc.value,
    amount:+amount.value,
    type:type.value
  };

  db.collection("transactions").doc(t.id).set(t);
}

// ================= LOAD (USER DATA ONLY)

function loadData(){
  db.collection("transactions")
    .where("uid","==",user.uid)
    .onSnapshot(snap=>{
      data=[];
      snap.forEach(doc=>data.push(doc.data()));
      render();
    });
}

// ================= DELETE

function del(id){
  db.collection("transactions").doc(id).delete();
}

// ================= RENDER

function render(){
  let inc=0,exp=0;
  list.innerHTML="";

  data.forEach(x=>{
    list.innerHTML+=`
      <tr>
        <td>${x.desc}</td>
        <td>${x.amount}</td>
        <td>${x.type}</td>
        <td><button onclick="del('${x.id}')">❌</button></td>
      </tr>
    `;

    x.type=="income"?inc+=x.amount:exp+=x.amount;
  });

  bal.innerText=inc-exp;
  inc.innerText=inc;
  exp.innerText=exp;

  drawChart(inc,exp);
}

// ================= CHART

function drawChart(i,e){
  if(chart) chart.destroy();

  chart=new Chart(document.getElementById("chart"),{
    type:"doughnut",
    data:{
      labels:["Income","Expense"],
      datasets:[{data:[i,e]}]
    }
  });
}

</script>

</body>
</html>
