<!DOCTYPE html>
<html>
<head>
  <title>My Money</title>
</head>
<body>

<h2>My Money App 💰</h2>

<h3>Register</h3>
<input id="name" placeholder="Name"><br><br>
<input id="email" placeholder="Email"><br><br>
<input id="password" placeholder="Password"><br><br>
<button onclick="register()">Register</button>

<hr>

<h3>Login</h3>
<input id="email2" placeholder="Email"><br><br>
<input id="password2" placeholder="Password"><br><br>
<button onclick="login()">Login</button>

<hr>

<h3>Add Transaction</h3>

<select id="type">
  <option value="income">Income</option>
  <option value="expense">Expense</option>
</select><br><br>

<input id="amount" placeholder="Amount"><br><br>
<input id="category" placeholder="Category"><br><br>
<input id="note" placeholder="Note"><br><br>

<button onclick="addTransaction()">Add</button>

<hr>

<h3>Transactions</h3>
<ul id="list"></ul>

<script>
const API = "https://my-money-backend-dq7n.onrender.com";

let token = localStorage.getItem("token") || "";

// REGISTER
async function register() {
  const res = await fetch(API + "/api/auth/register", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      name: document.getElementById("name").value,
      email: document.getElementById("email").value,
      password: document.getElementById("password").value
    })
  });

  alert("Registered ✅");
}

// LOGIN
async function login() {
  const res = await fetch(API + "/api/auth/login", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      email: document.getElementById("email2").value,
      password: document.getElementById("password2").value
    })
  });

  const data = await res.json();

  token = data.token;
  localStorage.setItem("token", token);

  alert("Login Success 🔥");
}

// ADD TRANSACTION
async function addTransaction() {
  const res = await fetch(API + "/api/transactions", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": token
    },
    body: JSON.stringify({
      type: document.getElementById("type").value,
      amount: document.getElementById("amount").value,
      category: document.getElementById("category").value,
      note: document.getElementById("note").value
    })
  });

  alert("Added ✅");
  getTransactions();
}

// GET DATA
async function getTransactions() {
  const res = await fetch(API + "/api/transactions", {
    headers: {"Authorization": token}
  });

  const data = await res.json();

  let list = document.getElementById("list");
  list.innerHTML = "";

  data.forEach(item => {
    list.innerHTML += `
      <li>${item.type} - ₹${item.amount} (${item.category})</li>
    `;
  });
}
</script>

</body>
</html>
