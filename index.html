<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Money Pro</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://checkout.razorpay.com/v1/checkout.js"></script>

<style>
body {
  font-family: sans-serif;
  background: #0f172a;
  color: #fff;
  padding: 15px;
}
.card {
  background: #1e293b;
  padding: 15px;
  margin: 10px 0;
  border-radius: 12px;
}
input {
  width: 100%;
  padding: 10px;
  margin: 5px 0;
}
button {
  padding: 10px;
  border: none;
  background: #22c55e;
  color: white;
  margin-top: 5px;
}
.pro {
  background: gold;
  color: black;
}
</style>
</head>

<body>

<h2>💰 My Money Pro</h2>

<!-- SIGNUP -->
<div class="card">
<h3>Create Account</h3>
<input id="s_email" placeholder="Email">
<input id="s_pass" type="password" placeholder="Password">
<button onclick="signup()">Signup</button>
</div>

<!-- LOGIN -->
<div class="card">
<h3>Login</h3>
<input id="email" placeholder="Email">
<input id="pass" type="password" placeholder="Password">
<button onclick="login()">Login</button>
</div>

<!-- ADD MONEY -->
<div class="card">
<input id="amt" type="number" placeholder="Amount">
<button onclick="add()">Add</button>
</div>

<!-- BUY PRO -->
<div class="card">
<button class="pro" onclick="pay()">Buy Pro ₹99</button>
</div>

<canvas id="chart"></canvas>

<script>
const API = "https://my-money-backend-dq7n.onrender.com";

let data = [];

// ✅ SIGNUP
async function signup(){
  const res = await fetch(API + "/signup", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({
      email: s_email.value,
      password: s_pass.value
    })
  });

  const d = await res.json();
  alert(d.message);
}

// ✅ LOGIN
async function login(){
  const res = await fetch(API + "/login", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({
      email: email.value,
      password: pass.value
    })
  });

  const d = await res.json();

  if(d.token){
    localStorage.setItem("token", d.token);
    alert("Login Success ✅");
  } else {
    alert("Login Failed ❌");
  }
}

// ✅ ADD DATA
function add(){
  data.push(+amt.value);
  update();
}

// ✅ CHART
function update(){
  new Chart(chart,{
    type:"bar",
    data:{
      labels:data,
      datasets:[{data:data}]
    }
  });
}

// ✅ PAYMENT (FIXED)
async function pay(){

  const res = await fetch(API + "/create-order",{
    method:"POST"
  });

  const order = await res.json();

  const options = {
    key: order.key, // 🔥 backend se ayega
    amount: order.amount,
    currency: "INR",
    order_id: order.id,

    handler: async function(response){

      await fetch(API + "/verify-payment",{
        method:"POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify(response)
      });

      alert("Payment Success 🎉");
      localStorage.setItem("pro","yes");
    }
  };

  new Razorpay(options).open();
}
</script>

</body>
</html>
