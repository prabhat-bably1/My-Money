<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Money</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://checkout.razorpay.com/v1/checkout.js"></script>

<style>
body{font-family:sans-serif;background:#0f172a;color:#fff;padding:10px}
.card{background:#1e293b;padding:15px;margin:10px 0;border-radius:10px}
button{padding:10px;border:none;background:#22c55e;margin-top:5px}
.pro{background:#f59e0b}
</style>
</head>

<body>

<h2>💰 My Money</h2>

<div class="card">
<input id="email" placeholder="Email"><br>
<input id="pass" type="password" placeholder="Password"><br>
<button onclick="login()">Login</button>
</div>

<div class="card">
<input id="desc" placeholder="Description">
<input id="amt" type="number" placeholder="Amount">
<button onclick="add()">Add</button>
</div>

<div class="card">
<button class="pro" onclick="pay()">Buy Pro ₹99</button>
</div>

<canvas id="chart"></canvas>

<script>
let data=[];

function login(){
localStorage.setItem("user", email.value);
alert("Login Done");
}

function add(){
data.push(+amt.value);
update();
}

function update(){
new Chart(chart,{
type:"bar",
data:{labels:data,dataSets:[{data:data}]}
});
}

function pay(){
var options = {
key: "rzp_test_xxxxx",
amount: 9900,
handler: function (){
alert("Pro Activated");
localStorage.setItem("pro","yes");
}
};
new Razorpay(options).open();
}
</script>

</body>
</html>
