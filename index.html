<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Money PRO</title>

<!-- Chart -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<!-- Razorpay -->
<script src="https://checkout.razorpay.com/v1/checkout.js"></script>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<style>
body{margin:0;font-family:sans-serif;background:#0f172a;color:#fff}
header{display:flex;justify-content:space-between;padding:15px;background:#020617}
.container{padding:15px}
.card{background:#1e293b;padding:15px;border-radius:12px;margin-bottom:15px}
input,select{padding:10px;margin:5px;border-radius:8px;border:none;width:100%}
button{padding:10px;border:none;border-radius:8px;background:#22c55e;color:#000;font-weight:bold;margin-top:5px}
button.pro{background:#f59e0b}
.balance{font-size:28px;font-weight:bold}
</style>
</head>

<body>

<header>
<div>💰 My Money PRO</div>
<div id="userBox"></div>
</header>

<div class="container" id="app"></div>

<script>

// 🔥 FIREBASE CONFIG (YAHAN APNA DALNA)
const firebaseConfig = {
  apiKey: "PASTE_YOUR_API_KEY",
  authDomain: "PASTE_AUTH_DOMAIN",
  projectId: "PASTE_PROJECT_ID",
  storageBucket: "PASTE_BUCKET",
  messagingSenderId: "PASTE_MSG_ID",
  appId: "PASTE_APP_ID"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// DATA
let user = localStorage.getItem("user");
let data = [];

// LOGIN UI
function showLogin(){
app.innerHTML = `
<div class="card">
<h2>Login</h2>
<input id="name" placeholder="Enter your name">
<button onclick="login()">Start</button>
</div>`;
}

// LOGIN
function login(){
const username = document.getElementById("name").value;

if(!username) return alert("Enter name");

localStorage.setItem("user", username);
location.reload();
}

// INIT
function init(){
userBox.innerHTML = `👤 ${user} <button onclick="logout()">Logout</button>`;
renderUI();
loadData();
}

// LOGOUT
function logout(){
localStorage.clear();
location.reload();
}

// UI
function renderUI(){
app.innerHTML = `
<div class="card">
<h3>Add Transaction</h3>
<input id="desc" placeholder="Description">
<input id="amount" type="number" placeholder="Amount">
<select id="type">
<option value="income">Income</option>
<option value="expense">Expense</option>
</select>
<button onclick="add()">Add</button>
</div>

<div class="card">
<div class="balance">₹ <span id="bal">0</span></div>
<canvas id="chart"></canvas>
</div>

<div class="card">
<button onclick="buyPro()" class="pro">🔥 Buy Pro ₹499</button>
<button onclick="exportData()">Export</button>
</div>

<div class="card">
<h3>Transactions</h3>
<table width="100%">
<tbody id="list"></tbody>
</table>
</div>
`;
}

// ADD DATA
function add(){
const t={
id:Date.now(),
desc:desc.value,
amount:+amount.value,
type:type.value
};

if(!t.desc || !t.amount) return alert("Fill all");

db.collection("users").doc(user)
.collection("data").doc(t.id.toString()).set(t);
}

// LOAD
function loadData(){
db.collection("users").doc(user)
.collection("data")
.onSnapshot(snap=>{
data=[];
snap.forEach(doc=>data.push(doc.data()));
render();
});
}

// DELETE
function del(id){
db.collection("users").doc(user)
.collection("data").doc(id.toString()).delete();
}

// RENDER
let chart;
function render(){
let inc=0, exp=0;
list.innerHTML="";

data.forEach(x=>{
list.innerHTML+=`
<tr>
<td>${x.desc}</td>
<td>₹${x.amount}</td>
<td>${x.type}</td>
<td><button onclick="del(${x.id})">❌</button></td>
</tr>
`;

x.type=="income"?inc+=x.amount:exp+=x.amount;
});

bal.innerText = inc-exp;

if(chart) chart.destroy();
chart=new Chart(document.getElementById("chart"),{
type:"bar",
data:{
labels:["Income","Expense"],
datasets:[{data:[inc,exp]}]
}
});
}

// 💳 RAZORPAY (KEY CHANGE KARNA)
function buyPro(){
var options = {
key: "PASTE_RAZORPAY_KEY",
amount: 49900,
currency: "INR",
name: "My Money PRO",
handler: function (){
alert("Payment Success ✅");
localStorage.setItem("pro","yes");
location.reload();
}
};
new Razorpay(options).open();
}

// PRO FEATURE
function exportData(){
if(localStorage.getItem("pro")!="yes"){
alert("Buy Pro First 🔒");
return;
}
const blob=new Blob([JSON.stringify(data)],{type:"application/json"});
const a=document.createElement("a");
a.href=URL.createObjectURL(blob);
a.download="data.json";
a.click();
}

// START
if(!user) showLogin();
else init();

</script>

</body>
</html>
