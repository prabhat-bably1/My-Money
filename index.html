<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Money Ultra</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body{margin:0;font-family:system-ui;background:linear-gradient(135deg,#e0f2fe,#f8fafc);color:#0f172a}
header{display:flex;justify-content:space-between;align-items:center;padding:16px 20px;background:rgba(255,255,255,0.8);backdrop-filter:blur(10px);box-shadow:0 4px 20px rgba(0,0,0,0.05)}
.logo{font-size:20px;font-weight:700}
.container{padding:20px;max-width:1000px;margin:auto}
.card{background:rgba(255,255,255,0.7);backdrop-filter:blur(12px);padding:20px;border-radius:16px;margin-bottom:16px;box-shadow:0 8px 30px rgba(0,0,0,0.08);transition:0.3s}
.card:hover{transform:translateY(-3px)}
.row{display:flex;flex-wrap:wrap;gap:10px}
input,select{padding:12px;border-radius:10px;border:1px solid #cbd5e1;width:150px}
button{padding:12px 18px;border-radius:10px;border:none;background:linear-gradient(135deg,#3b82f6,#06b6d4);color:white;font-weight:600;cursor:pointer;transition:0.3s}
button:hover{opacity:0.85}
table{width:100%;margin-top:10px;border-collapse:collapse}
th,td{padding:10px;border-bottom:1px solid #e2e8f0}
.income{color:#16a34a;font-weight:600}
.expense{color:#dc2626;font-weight:600}
.balance{font-size:26px;font-weight:700}
</style>
</head>
<body>
<header>
<div class="logo">💎 My Money Ultra</div>
<div id="userBox"></div>
</header>

<div class="container" id="app"></div>

<script>
let user = localStorage.getItem('user');

function showAuth(){
 document.getElementById('app').innerHTML=`
 <div class='card'>
 <h2>Welcome 👋</h2>
 <p>Track your money smartly</p>
 <input id='username' placeholder='Enter your name'>
 <button onclick='login()'>Start</button>
 </div>`;
}

function login(){
 const name=username.value;
 if(!name) return alert('Enter name');
 localStorage.setItem('user',name);
 user=name;
 init();
}

function logout(){
 localStorage.removeItem('user');
 location.reload();
}

let data = JSON.parse(localStorage.getItem('money-data'))||[];

function init(){
 userBox.innerHTML=`👤 ${user} <button onclick='logout()'>Logout</button>`;
 renderUI();
 render();
}

function renderUI(){
 app.innerHTML=`
 <div class='card'>
 <h3>Add Transaction</h3>
 <div class='row'>
 <input id='desc' placeholder='Description'>
 <input id='amount' type='number' placeholder='Amount'>
 <select id='type'>
 <option value='income'>Income</option>
 <option value='expense'>Expense</option>
 </select>
 <select id='category'>
 <option>General</option>
 <option>Food</option>
 <option>Salary</option>
 <option>Shopping</option>
 </select>
 <button onclick='add()'>Add</button>
 </div>
 </div>

 <div class='card'>
 <div class='balance'>₹<span id='bal'>0</span></div>
 <canvas id='chart'></canvas>
 </div>

 <div class='card'>
 <h3>Transactions</h3>
 <table>
 <thead><tr><th>Desc</th><th>₹</th><th>Type</th><th>Cat</th><th></th></tr></thead>
 <tbody id='list'></tbody>
 </table>
 </div>`;
}

function add(){
 const t={id:Date.now(),desc:desc.value,amount:+amount.value,type:type.value,category:category.value};
 if(!t.desc||!t.amount) return alert('Fill all');
 data.push(t);
 save();render();
}

function del(id){
 data=data.filter(x=>x.id!==id);
 save();render();
}

function save(){localStorage.setItem('money-data',JSON.stringify(data));}

let chart;
function render(){
 let inc=0,exp=0;
 list.innerHTML='';
 data.forEach(x=>{
 list.innerHTML+=`<tr>
 <td>${x.desc}</td>
 <td>₹${x.amount}</td>
 <td class='${x.type}'>${x.type}</td>
 <td>${x.category}</td>
 <td><button onclick='del(${x.id})'>❌</button></td>
 </tr>`;
 x.type==='income'?inc+=x.amount:exp+=x.amount;
 });
 bal.innerText=inc-exp;
 drawChart(inc,exp);
}

function drawChart(i,e){
 if(chart) chart.destroy();
 chart=new Chart(document.getElementById('chart'),{
 type:'doughnut',
 data:{labels:['Income','Expense'],datasets:[{data:[i,e]}]}
 });
}

if(!user) showAuth(); else init();
</script>
</body>
</html>
